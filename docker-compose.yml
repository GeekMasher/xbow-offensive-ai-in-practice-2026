services:
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "/nodejs/bin/node",
          "-e",
          "require('http').get('http://localhost:3000', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 20s
      timeout: 3s
      retries: 20
      start_period: 40s

  # OWASP ZAP baseline scan (run as a one-shot job)
  zap-baseline:
    image: zaproxy/zap-stable:latest
    container_name: zap-baseline
    depends_on:
      juice-shop:
        condition: service_healthy
    volumes:
      - ./out/zap:/zap/wrk:rw
    command:
      [
        "zap-baseline.py",
        "-t",
        "http://juice-shop:3000",
        "-r",
        "zap_baseline_report.html",
      ]

  # PentestGPT (interactive). Requires cloning the repo into ./tools/PentestGPT first.
  pentestgpt:
    build:
      context: ./tools/PentestGPT
      dockerfile: Dockerfile
    container_name: pentestgpt
    stdin_open: true
    tty: true
    working_dir: /workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TERM=xterm-256color
      - PYTHONUNBUFFERED=1
      - PENTESTGPT_AUTH_MODE=${PENTESTGPT_AUTH_MODE:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./workspace:/workspace
      # (Optional) Persist Claude Code config if you use it inside PentestGPT:
      - claude-config:/home/pentester/.claude
      - ccr-config:/home/pentester/.claude-code-router
    depends_on:
      juice-shop:
        condition: service_healthy

volumes:
  claude-config:
  ccr-config:
  shannon-temporal-data:
  shannon-postgres-data:
